name: Deploy to Cloud Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Build application
        run: |
          go build -o bbsDemo
          chmod +x bbsDemo

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            # 停止旧服务
            if pgrep -f "bbsDemo" > /dev/null; then
              pkill -f "bbsDemo"
              sleep 2
            fi
            
            # 备份旧版本
            if [ -f "/opt/bbsDemo/bbsDemo" ]; then
              cp /opt/bbsDemo/bbsDemo /opt/bbsDemo/bbsDemo.bak
            fi
            
            # 创建部署目录
            mkdir -p /opt/bbsDemo
            
            # 上传新文件
            # 注意：这里会通过SSH传输文件，实际操作会由ssh-action处理
            
            # 复制配置文件（如果不存在）
            if [ ! -f "/opt/bbsDemo/config.yaml" ]; then
              echo "配置文件不存在，需要手动创建"
            fi
            
            # 启动服务
            cd /opt/bbsDemo
            nohup ./bbsDemo > app.log 2>&1 &
            
            # 检查服务状态
            sleep 3
            if pgrep -f "bbsDemo" > /dev/null; then
              echo "服务启动成功"
            else
              echo "服务启动失败"
              exit 1
            fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbsDemo
          path: bbsDemo
